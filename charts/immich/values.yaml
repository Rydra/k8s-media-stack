service:
  name: immich-server
  httpRoutePath: "/"
  servicePort: 2283

hostnames:
  - immich.local

app:
  ## This chart relies on the common library chart from bjw-s
  ## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-4.3.0/charts/library/common
  ## Refer there for more detail about the supported values

  # Original chart: https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml

  # These entries are shared between all the Immich components

  controllers:
    main:
      containers:
        main:
          image:
            tag: v2.5.6
          env:
            REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
            IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
            # Add the env vars to connect to your database here.
            DB_HOSTNAME: "immich-db"

  immich:
    metrics:
      # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
      enabled: false
    persistence:
      # Main data store for all photos shared between different components.
      library:
        # Automatically creating the library volume is not supported by this chart
        # You have to specify an existing PVC to use
        existingClaim: immich-pvc
    # configuration is immich-config.json converted to yaml
    # ref: https://immich.app/docs/install/config-file/
    #
    configuration: {}
      # trash:
      #   enabled: false
      #   days: 30
      # storageTemplate:
      #   enabled: true
      #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"
    # Sets the resource Kind to store configuration in. Must be either ConfigMap or Secret.
    configurationKind: ConfigMap

  # Dependencies

  valkey:
    enabled: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: docker.io/valkey/valkey
              tag: 9.0-alpine@sha256:1be494495248d53e3558b198a1c704e6b559d5e99fe4c926e14a8ad24d76c6fa
              pullPolicy: IfNotPresent
    persistence:
      data:
        enabled: true
        size: 1Gi
        # Optional: Set this to persistentVolumeClaim to keep job queues persistent
        type: emptyDir
        accessMode: ReadWriteOnce
        # storageClass: your-class

  # Immich components

  server:
    enabled: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              pullPolicy: IfNotPresent
    ingress:
      main:
        enabled: false
        annotations:
          # proxy-body-size is set to 0 to remove the body limit on file uploads
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: immich.local
            paths:
              - path: "/"
                service:
                  identifier: main
        tls: []

  machine-learning:
    enabled: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              pullPolicy: IfNotPresent
            env:
              TRANSFORMERS_CACHE: /cache
              HF_XET_CACHE: /cache/huggingface-xet
              MPLCONFIGDIR: /cache/matplotlib-config
    persistence:
      cache:
        enabled: true
        size: 10Gi
        # Optional: Set this to persistentVolumeClaim to avoid downloading the ML models every start.
        type: emptyDir
        accessMode: ReadWriteMany
        # storageClass: your-class

database:
  name: immich-db
  image: "registry.hub.docker.com/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0"
  replicas: 1
  servicePort: 5432
  exposeGateway: false
  volumeMounts:
    - name: config
      mountPath: /var/lib/postgresql/data
      subPath: immich-db
  environmentData:
    env:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USERNAME: "postgres"
      POSTGRES_DB: "immich"

  securityContext:
    fsGroup: 1000
