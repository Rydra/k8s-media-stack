service:
  name: immich-db
  image: "registry.hub.docker.com/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0"
  replicas: 1
  servicePort: 5432
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      #cpu: 500m
      #memory: 512Mi
  livenessProbe:
    # httpGet:
    #   path: /komga/actuator/health
    #   port: 25600
    # initialDelaySeconds: 30
    # periodSeconds: 10
    # failureThreshold: 1
  readinessProbe:
    # httpGet:
    #   path: /komga/actuator/health
    #   port: 25600
    # initialDelaySeconds: 30
    # periodSeconds: 5
  volumeMounts:
    - name: immich
      mountPath: /var/lib/postgresql/data
      subPath: dbdata
  env:
    POSTGRES_PASSWORD: "postgres"
    POSTGRES_USERNAME: "postgres"
    POSTGRES_DB: "immich"

securityContext:
  fsGroup: 1000

hostnames: []

storage:
  immichClaimName: immich-pvc

gatewayClassName: traefik
