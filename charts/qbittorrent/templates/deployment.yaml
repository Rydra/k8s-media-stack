apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: {{ .Values.service.name }}
  name: {{ .Values.service.name }}
spec:
  replicas: {{ .Values.service.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.service.name }}
    spec:
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.storage.configClaimName }}
        - name: media-storage
          persistentVolumeClaim:
            claimName: {{ .Values.storage.mediaClaimName }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - image: {{ .Values.service.image }}
          name: {{ .Values.service.name }}
          resources:
            {{- toYaml .Values.service.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.service.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.service.readinessProbe | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.servicePort }}
              protocol: TCP
            # Need to open these ports in the host, otherwise
            # we won't be able to connect to the torrent swarm.
            # We could also configure new traefik routers for these ports
            - containerPort: {{ .Values.service.torrentingPort }}
              protocol: TCP
              hostPort: {{ .Values.service.torrentingPort }}
            - containerPort: {{ .Values.service.torrentingPort }}
              protocol: UDP
              hostPort: {{ .Values.service.torrentingPort }}
          volumeMounts:
            {{- toYaml .Values.service.volumeMounts | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.service.name }}-config
