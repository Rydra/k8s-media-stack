app:
  name: qbittorrent
  image: "linuxserver/qbittorrent:latest"
  replicas: 1
  servicePort: 8080
  hostPorts:
    - name: torrenting-tcp
      port: 6881
      protocol: TCP
    - name: torrenting-tcp
      port: 6881
      protocol: UDP
  httpRoutePath: "/"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: qbittorrent
    - name: media
      mountPath: /downloads
      subPath: downloads
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  env:
    TORRENTING_PORT: "6881"
    WEBUI_PORT: "8080"
  hostnames:
    - qbit.local
