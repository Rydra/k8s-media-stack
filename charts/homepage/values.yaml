includeGlobs:
  - "configs/*"

app:
  name: homepage
  replicas: 1

  pod:
    image: "ghcr.io/gethomepage/homepage:latest"
    ports:
      servicePort: 3000
    podOptions:
      serviceAccountName: homepage-sa
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
    storage:
      extraVolumes:
        - name: homepage-files
          configMap:
            name: homepage-files
        - name: logs
          emptyDir: {}
    volumeMounts:
      - mountPath: /app/config/custom.js
        name: homepage-files
        subPath: custom.js
      - mountPath: /app/config/custom.css
        name: homepage-files
        subPath: custom.css
      - mountPath: /app/config/bookmarks.yaml
        name: homepage-files
        subPath: bookmarks.yaml
      - mountPath: /app/config/docker.yaml
        name: homepage-files
        subPath: docker.yaml
      - mountPath: /app/config/kubernetes.yaml
        name: homepage-files
        subPath: kubernetes.yaml
      - mountPath: /app/config/services.yaml
        name: homepage-files
        subPath: services.yaml
      - mountPath: /app/config/settings.yaml
        name: homepage-files
        subPath: settings.yaml
      - mountPath: /app/config/widgets.yaml
        name: homepage-files
        subPath: widgets.yaml
      - mountPath: /app/config/logs
        name: logs
    environmentData:
      # This will require to prepopulate env var secrets beforehand. The ones
      # required are:
      # - HOMEPAGE_VAR_KOMGA_USER
      # - HOMEPAGE_VAR_KOMGA_PW
      envSecretName: "homepage-secret-env"
      env:
        HOMEPAGE_ALLOWED_HOSTS: "home.local"
    annotations:
      reloader.stakater.com/auto: "true"

  gateway:
    enabled: true
    httpRoutePath: "/"
    hostnames:
      - home.local
