apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    {{- if .Values.annotations }}
    {{- toYaml .Values.annotations | nindent 4 }}
    {{- end }}

spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage-sa
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
            # This will require to prepopulate env var secrets beforehand. The ones
            # required are:
            # - HOMEPAGE_VAR_KOMGA_USER
            # - HOMEPAGE_VAR_KOMGA_PW
            - secretRef:
                name: homepage-secret-env
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-files
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-files
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-files
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-files
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-files
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-files
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-files
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-files
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        {{- if .Values.includeGlobs }}
        - name: {{ .Values.name }}-files
          configMap:
            name: {{ .Values.name }}-files
        {{- end }}
        - name: logs
          emptyDir: {}
