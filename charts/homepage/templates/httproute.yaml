apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-http-route
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: kube-system
  # NOTE: If no hostnames are given, this will match them all. For a local
  # setup it's perfect.
  hostnames:
    {{- toYaml .Values.hostnames | nindent 4 }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: {{ .Values.httpRoutePath }}
      backendRefs:
        - name: {{ .Values.name }}
          port: {{ .Values.servicePort }}
