apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - My First Group:
        - Komga:
            icon: komga.png
            href: http://localhost/komga
            description: Homepage is awesome
            namespace: media-stack
            app: komga
            widget:
                type: komga
                url: http://komga:25600/komga
                username: {{ "{{HOMEPAGE_VAR_KOMGA_USER}}" | quote }}
                password: {{ "{{HOMEPAGE_VAR_KOMGA_PW}}" | quote }}

    - My Second Group:
        - Radarr:
            icon: radarr.png
            href: http://localhost/radarr
            description: Homepage is the best
            namespace: media-stack
            app: radarr
            widget:
              type: radarr
              url: http://radarr:7878/radarr
              key: {{ "{{HOMEPAGE_VAR_RADARR_APIKEY}}" | quote }}
              enableQueue: true # optional, defaults to false

        - Sonarr:
            icon: sonarr.png
            href: http://localhost/sonarr
            description: Homepage is the greatest
            namespace: media-stack
            app: sonarr
            widget:
              type: sonarr
              url: http://sonarr:8989/sonarr
              key: {{ "{{HOMEPAGE_VAR_SONARR_APIKEY}}" | quote }}
              enableQueue: true # optional, defaults to false

        - Mylar3:
            icon: mylar3.png
            href: http://localhost/mylar3
            description: Homepage is the coolest
            namespace: media-stack
            app: mylar3
            widget:
              type: mylar
              url: http://mylar3:8090/mylar3
              key: {{ "{{HOMEPAGE_VAR_MYLAR3_APIKEY}}" | quote }}

        - Prowlarr:
            icon: prowlarr.png
            href: http://localhost/prowlarr
            description: Homepage is the coolest
            namespace: media-stack
            app: prowlarr
            widget:
              type: prowlarr
              url: http://prowlarr:9696/prowlarr
              key: {{ "{{HOMEPAGE_VAR_PROWLARR_APIKEY}}" | quote }}

        - Jellyfin:
            icon: jellyfin.png
            href: http://localhost/jellyfin
            description: Homepage is the coolest
            namespace: media-stack
            app: jellyfin

    - My Third Group:
        - Paperless:
            icon: paperless.png
            href: http://localhost/paperless
            description: Homepage is 😎
            namespace: media-stack
            app: paperless-ngx
            widget:
              type: paperlessngx
              url: http://paperless-ngx:8000
              username: {{ "{{HOMEPAGE_VAR_PAPERLESS_USER}}" | quote }}
              password: {{ "{{HOMEPAGE_VAR_PAPERLESS_PW}}" | quote }}

        - QBittorrent:
            icon: qbittorrent.png
            href: http://qbit.local
            description: Homepage is the best dashboard ever
            namespace: media-stack
            app: qbittorrent
            widget:
              type: qbittorrent
              url: http://qbittorrent:8080
              username: {{ "{{HOMEPAGE_VAR_QBT_USER}}" | quote }}
              password: {{ "{{HOMEPAGE_VAR_QBT_PW}}" | quote }}
              enableLeechProgress: true # optional, defaults to false
              enableLeechSize: true # optional, defaults to false

        - Immich:
            icon: immich.png
            href: http://immich.local
            description: Homepage is the best dashboard ever
            namespace: media-stack
            app: server
            widget:
              type: immich
              url: http://immich-server:2283
              key: {{ "{{HOMEPAGE_VAR_IMMICH_APIKEY}}" | quote }}
              version: 2
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
