apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - My First Group:
        - Komga:
            icon: komga.png
            href: http://localhost/komga
            namespace: media-stack
            app: komga
            widget:
                type: komga
                url: http://komga:25600/komga
                username: {{ "{{HOMEPAGE_VAR_KOMGA_USER}}" | quote }}
                password: {{ "{{HOMEPAGE_VAR_KOMGA_PW}}" | quote }}

        - Jellyfin:
            icon: jellyfin.png
            href: http://localhost/jellyfin
            namespace: media-stack
            app: jellyfin
            widget:
              type: jellyfin
              url: http://jellyfin:8096/jellyfin
              key: {{ "{{HOMEPAGE_VAR_JELLYFIN_APIKEY}}" | quote }}
              version: 2 # optional, default is 1
              enableBlocks: true # optional, defaults to false
              enableNowPlaying: true # optional, defaults to true
              enableUser: true # optional, defaults to false
              enableMediaControl: false # optional, defaults to true
              showEpisodeNumber: true # optional, defaults to false
              expandOneStreamToTwoRows: false # optional, defaults to true

        - Immich:
            icon: immich.png
            href: http://immich.local
            namespace: media-stack
            app: server
            widget:
              type: immich
              url: http://immich-server:2283
              key: {{ "{{HOMEPAGE_VAR_IMMICH_APIKEY}}" | quote }}
              version: 2

        - Paperless:
            icon: paperless.png
            href: http://localhost/paperless
            namespace: media-stack
            app: paperless-ngx
            widget:
              type: paperlessngx
              url: http://paperless-ngx:8000
              username: {{ "{{HOMEPAGE_VAR_PAPERLESS_USER}}" | quote }}
              password: {{ "{{HOMEPAGE_VAR_PAPERLESS_PW}}" | quote }}

    - Arr Stack:
        - Radarr:
            icon: radarr.png
            href: http://localhost/radarr
            namespace: media-stack
            app: radarr
            widget:
              type: radarr
              url: http://radarr:7878/radarr
              key: {{ "{{HOMEPAGE_VAR_RADARR_APIKEY}}" | quote }}
              enableQueue: true # optional, defaults to false

        - Sonarr:
            icon: sonarr.png
            href: http://localhost/sonarr
            namespace: media-stack
            app: sonarr
            widget:
              type: sonarr
              url: http://sonarr:8989/sonarr
              key: {{ "{{HOMEPAGE_VAR_SONARR_APIKEY}}" | quote }}
              enableQueue: true # optional, defaults to false

        - Kapowarr:
            icon: sh-kapowarr
            href: http://localhost/kapowarr
            namespace: media-stack
            app: kapowarr

        - Prowlarr:
            icon: prowlarr.png
            href: http://localhost/prowlarr
            namespace: media-stack
            app: prowlarr
            widget:
              type: prowlarr
              url: http://prowlarr:9696/prowlarr
              key: {{ "{{HOMEPAGE_VAR_PROWLARR_APIKEY}}" | quote }}

    - Downloads:
        - QBittorrent:
            icon: qbittorrent.png
            href: http://qbit.local
            namespace: media-stack
            app: qbittorrent
            widget:
              type: qbittorrent
              url: http://qbittorrent:8080
              username: {{ "{{HOMEPAGE_VAR_QBT_USER}}" | quote }}
              password: {{ "{{HOMEPAGE_VAR_QBT_PW}}" | quote }}
              enableLeechProgress: true # optional, defaults to false
              enableLeechSize: true # optional, defaults to false

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
