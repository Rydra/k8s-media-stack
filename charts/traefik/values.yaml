# Values obtainable from https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        exposedPort: 8080
      websecure:
        exposedPort: 8443
    api:
      dashboard: true
      #basePath: "traefik-dashboard"
    providers:
      kubernetesGateway:
        enabled: true
      # Disable the ingress controller, we'll use gateway instead
      kubernetesIngress:
        enabled: false
    gateway:
      listeners:
        web:
          namespacePolicy:
            from: All
