app:
  name: sonarr
  replicas: 1

  pod:
    image: "linuxserver/sonarr:latest"
    ports:
      servicePort: 8989
    volumeMounts:
      - name: config
        mountPath: /config
        subPath: sonarr
      - name: media
        mountPath: /downloads
        subPath: downloads
      - name: media
        mountPath: /media/tvshows
        subPath: media/tvshows
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

  gateway:
    enabled: true
    httpRoutePath: "/sonarr"
