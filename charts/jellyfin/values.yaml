app:
  name: jellyfin
  image: "jellyfin/jellyfin:latest"
  replicas: 1
  servicePort: 8096
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
  httpRoutePath: "/jellyfin"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: jellyfin
    - name: media
      mountPath: /data
      subPath: media

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
