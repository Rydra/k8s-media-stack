app:
  name: vaultwarden
  image: "vaultwarden/server:latest"
  replicas: 1

  pod:
    ports:
      servicePort: 80

  gateway:
    enabled: true
    httpRoutePath: "/"
    secure: true
    hostnames:
      - "vault.local"
  volumeMounts:
    - name: config
      mountPath: /data
      subPath: vaultwarden
