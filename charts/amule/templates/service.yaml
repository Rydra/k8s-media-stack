apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: {{ .Values.service.name }}
  name: {{ .Values.service.name }}
spec:
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.servicePort }}
      targetPort: {{ .Values.service.servicePort }}
    - name: amule-tcp
      protocol: TCP
      port: {{ .Values.service.amuleTCPPort }}
      targetPort: {{ .Values.service.amuleTCPPort }}
    - name: amule-udp
      protocol: UDP
      port: {{ .Values.service.amuleUDPPort }}
      targetPort: {{ .Values.service.amuleUDPPort }}
    - name: extended-udp
      protocol: UDP
      port: {{ .Values.service.extendedUDPPort }}
      targetPort: {{ .Values.service.extendedUDPPort }}
  selector:
    app.kubernetes.io/name: {{ .Values.service.name }}
