service:
  name: amule
  image: "ngosang/amule:latest"
  replicas: 1
  servicePort: 4711
  amuleTCPPort: 4662
  amuleUDPPort: 4665
  extendedUDPPort: 4672
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      #cpu: 500m
      #memory: 512Mi
  livenessProbe:
    # httpGet:
    #   path: /komga/actuator/health
    #   port: 25600
    # initialDelaySeconds: 30
    # periodSeconds: 10
    # failureThreshold: 1
  readinessProbe:
    # httpGet:
    #   path: /komga/actuator/health
    #   port: 25600
    # initialDelaySeconds: 30
    # periodSeconds: 5
  httpRoutePath: "/"
  volumeMounts:
    - name: config
      mountPath: /home/amule/.aMule
      subPath: amule
    - name: media-storage
      mountPath: /incoming
      subPath: downloads/amule
    - name: media-storage
      mountPath: /temp
      subPath: downloads/amule/temp
  env:
    MOD_AUTO_RESTART_ENABLED: "true"
    MOD_AUTO_RESTART_CRON: "0 6 * * *"
    MOD_AUTO_SHARE_ENABLED: "false"
    MOD_AUTO_SHARE_DIRECTORIES: "/incoming"
    MOD_FIX_KAD_GRAPH_ENABLED: "true"
    MOD_FIX_KAD_BOOTSTRAP_ENABLED: "true"
    GUI_PWD: "mypass"
    WEBUI_PWD: "mypass"
    TZ: "Europe/Madrid"
    PUID: "1000"
    PGID: "1000"

securityContext:
  # runAsNonRoot: true
  # runAsUser: 1000

hostnames:

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
