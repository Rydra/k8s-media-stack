apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# This creates a secret named vaultwarden-tls in the default namespace, which Traefik can use for TLS termination
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-cert
  namespace: kube-system  # This needs to be in the same namespace as Traefik, since Traefik will look for the secret there
  # Otherwise we'd get the error "Cannot load CertificateRef default/vaultwarden-tls: missing referencegrant" when trying
  # to load the certificate in Traefik, because Traefik doesn't have permission to access secrets in other namespaces
spec:
  dnsNames:
    - localhost
    - vault.local  # Optional: if you use a local domain
  secretName: local-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
