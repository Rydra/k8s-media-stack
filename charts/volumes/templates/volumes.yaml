apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.name }}-pv-volume
  labels:
    type: local
spec:
  storageClassName: {{ .Values.storage.storageClass }}
  capacity:
    storage: 3Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: {{ .Values.storage.localPath }}
  persistentVolumeReclaimPolicy: Retain
