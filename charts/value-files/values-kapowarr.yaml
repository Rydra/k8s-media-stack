service:
  name: kapowarr
  image: "mrcas/kapowarr:latest"
  replicas: 1
  servicePort: 5656
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
  livenessProbe:
  readinessProbe:
  httpRoutePath: "/kapowarr"
  volumeMounts:
    - name: config
      mountPath: /app/db
      subPath: kapowarr
    - name: media
      mountPath: /app/temp_downloads
      subPath: downloads
    - name: media
      mountPath: /comics
      subPath: media/books/comics
  env:
    PUID: "1000"
    PGID: "1000"

securityContext:
  #runAsUser: 1000
  #runAsGroup: 1000
  #fsGroup: 1000

hostnames: []

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
