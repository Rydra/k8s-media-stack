service:
  name: readarr
  image: "linuxserver/readarr:0.4.19-nightly"
  replicas: 1
  servicePort: 8787
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1024Mi
  livenessProbe:
  readinessProbe:
  httpRoutePath: "/readarr"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: readarr
    - name: media
      mountPath: /downloads
      subPath: downloads
    - name: media
      mountPath: /media/books
      subPath: media/books
  env:

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

hostnames: []

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
