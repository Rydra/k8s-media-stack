service:
  name: komga
  image: "gotson/komga:latest"
  replicas: 1
  servicePort: 25600
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
  livenessProbe:
    httpGet:
      path: /komga/actuator/health
      port: 25600
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 1
  readinessProbe:
    httpGet:
      path: /komga/actuator/health
      port: 25600
    initialDelaySeconds: 30
    periodSeconds: 5
  httpRoutePath: "/komga"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: komga
    - name: media
      mountPath: /data
      subPath: media/books
  env:

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

hostnames: []

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
