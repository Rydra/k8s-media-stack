service:
  name: sonarr
  image: "linuxserver/sonarr:latest"
  replicas: 1
  servicePort: 8989
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1024Mi
  livenessProbe:
  readinessProbe:
  httpRoutePath: "/sonarr"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: sonarr
    - name: media
      mountPath: /downloads
      subPath: downloads
    - name: media
      mountPath: /media/tvshows
      subPath: media/tvshows
  env:

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

hostnames: []

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
