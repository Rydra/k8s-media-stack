service:
  name: retrom
  image: "ghcr.io/jmberesford/retrom-service:latest"
  replicas: 1
  servicePort: 5101
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
  livenessProbe:
  readinessProbe:
  httpRoutePath: "/"
  volumeMounts:
    - name: config
      mountPath: /app/config/
      subPath: retrom/config
    - name: config
      mountPath: /app/data/
      subPath: retrom/data
    - name: media
      mountPath: /app/romlibrary
      subPath: games/romlibrary
  env:

securityContext:

hostnames:
  - retrom.local

storage:
  configClaimName: config-pvc
  mediaClaimName: media-pvc

gatewayClassName: traefik
