app:
  name: komga
  image: "gotson/komga:latest"
  replicas: 1
  servicePort: 25600
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /komga/actuator/health
      port: 25600
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 1
  readinessProbe:
    httpGet:
      path: /komga/actuator/health
      port: 25600
    initialDelaySeconds: 30
    periodSeconds: 5
  httpRoutePath: "/komga"
  volumeMounts:
    - name: config
      mountPath: /config
      subPath: komga
    - name: media
      mountPath: /data
      subPath: media/books
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
