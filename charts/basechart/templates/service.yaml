{{- if .Values.exposeService }}
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
  name: {{ .Values.name }}
spec:
  ports:
    - name: "http"
      port: {{ .Values.pod.ports.servicePort }}
      protocol: TCP
      targetPort: {{ .Values.pod.ports.servicePort }}
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
{{- end }}
