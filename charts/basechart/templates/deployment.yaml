apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: {{ .Values.name | required "Please provide a name for the service you want to deploy" }}
  name: {{ .Values.name }}
  annotations:
    {{- if .Values.annotations }}
    {{- toYaml .Values.annotations | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
    spec:
      {{- if .Values.podOptions -}}
      {{- toYaml .Values.podOptions | nindent 6 }}
      {{- end }}
      volumes:
        {{- range .Values.storage.fromClaims }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
        {{- end }}
        {{- if .Values.storage.extraVolumes }}
          {{- toYaml .Values.storage.extraVolumes | nindent 8 }}
        {{- end }}
      {{- if .Values.securityContext }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- end }}
      containers:
        - image: {{ .Values.image | required "Please provide an image for the service you want to deploy" }}
          name: {{ .Values.name }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.commandArgs }}
          args:
            {{- toYaml .Values.commandArgs | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.probes.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.probes.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.probes.readinessProbe | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.servicePort }}
              protocol: TCP
            {{- range .Values.hostPorts }}
            - containerPort: {{ .port }}
              protocol: {{ .protocol | default "TCP" }}
              name: {{ .name }}
              hostPort: {{ .port }}
            {{- end }}
          {{- if .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml .Values.volumeMounts | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.name }}-config
            {{- if .Values.environmentData.envSecretName }}
            - secretRef:
                name: {{ .Values.environmentData.envSecretName }}
            {{- end }}
          env:
            {{- range .Values.environmentData.envSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .key }}
            {{- end }}
