apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: {{ .Values.service.name }}
  name: {{ .Values.service.name }}
spec:
  replicas: {{ .Values.service.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.service.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.service.name }}
    spec:
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.storage.configClaimName }}
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Values.storage.mediaClaimName }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      containers:
        - name: {{ .Values.service.name }}
          image: {{ .Values.service.image }}
          resources:
            {{- toYaml .Values.service.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.service.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.service.readinessProbe | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.servicePort }}
              protocol: TCP
          volumeMounts:
            {{- toYaml .Values.service.volumeMounts | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.service.name }}-config

        - name: broker
          image: docker.io/library/redis:7
          volumeMounts:
            - name: config
              mountPath: /data
              subPath: paperless-ngx/redis

        - name: db
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
          image: docker.io/library/postgres:15
          volumeMounts:
            - name: config
              mountPath: /var/lib/postgresql/data
              subPath: paperless-ngx/postgres
          env:
            - name: POSTGRES_USER
              value: paperless
            - name: POSTGRES_PASSWORD
              value: paperless
            - name: POSTGRES_DB
              value: paperless

        - name: gotenberg
          image: docker.io/gotenberg/gotenberg:7.10
          command:
            - gotenberg
          args:
            - "--chromium-disable-javascript=true"
            - "--chromium-allow-list=file:///tmp/.*"

        - name: tika
          image: apache/tika:3.2.3.0-full
