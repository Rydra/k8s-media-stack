apiVersion: v2
name: metube
description: YouTube content downloader with support for playlists and formatting options

# A chart can be either an 'application' or a 'library' chart. A library chart
# is a collection of templates that can be re-used in other charts.
type: application

version: 0.1.0

appVersion: "latest"

dependencies:
  - name: basechart
    version: "0.1.0"
    repository: "file://../basechart"
    alias: app
