# Values obtainable from https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
# For k3s we need to modify the file /var/lib/rancher/k3s/server/manifests/traefik-custom.yaml

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web:
        exposedPort: 80
      websecure:
        exposedPort: 443
    api:
      dashboard: true
      #basePath: "traefik-dashboard"
    providers:
      kubernetesGateway:
        enabled: true
      # Disable the ingress controller, we'll use gateway instead
      kubernetesIngress:
        enabled: false
    gateway:
      listeners:
        web:
          namespacePolicy:
            from: All
        websecure:
          port: 8443
          mode: Terminate  # Traefik handles the SSL, then talks "normal" HTTP to the pod
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: local-tls
              kind: Secret
